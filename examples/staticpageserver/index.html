<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kLang Static Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #f7f7f2;
      color: #202124;
    }

    main {
      max-width: 560px;
      padding: 32px;
      border: 1px solid #deded2;
      background: #ffffff;
    }

    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello from kLang</h1>
    <p>This page is served by the static page server example.</p>
  </main>
</body>
</html>
