name: Deploy documentation website

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - script.js
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Package static website
    runs-on: ubuntu-latest
    steps:
      - name: Check out website files
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Assemble website
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html styles.css script.js logo.png _site/
          cp README.md LANGUAGE-SPEC.md DATA-TYPES.md SYNTAX.md _site/
          touch _site/.nojekyll

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
